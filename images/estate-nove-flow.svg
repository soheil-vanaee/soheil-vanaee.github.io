<svg viewBox="0 0 1720 760" xmlns="http://www.w3.org/2000/svg" font-family="Vazirmatn, Tahoma, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8c6239"></path>
    </marker>
  </defs>

  <rect x="0" y="0" width="1720" height="760" fill="#eef0ee"></rect>

  <text x="860" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#16202a">
    User Flow — Estate Nove
  </text>
  <text x="860" y="80" text-anchor="middle" font-size="15" fill="#667089">
    مسیر کاربر از ورود به سایت تا تماس با مشاور / ثبت‌نام
  </text>

  <!-- Node 1: Landing -->
  <rect x="40" y="300" width="200" height="110" rx="16" fill="#10202b"></rect>
  <text x="140" y="345" text-anchor="middle" font-size="16" font-weight="600" fill="#ffffff">ورود به سایت</text>
  <text x="140" y="368" text-anchor="middle" font-size="12" fill="#d9dde0">صفحه اصلی / Hero</text>
  <text x="140" y="388" text-anchor="middle" font-size="11" fill="#a3754c">Landing Page</text>

  <!-- Node 2: Browse -->
  <rect x="330" y="300" width="220" height="110" rx="16" fill="#ffffff" stroke="#a3754c" stroke-width="2"></rect>
  <text x="440" y="340" text-anchor="middle" font-size="16" font-weight="600" fill="#16202a">مرور و فیلتر آگهی‌ها</text>
  <text x="440" y="362" text-anchor="middle" font-size="12" fill="#667089">تب‌های Buy / Rent / Sell</text>
  <text x="440" y="382" text-anchor="middle" font-size="11" fill="#a3754c">Faceted Search + Progressive Disclosure</text>

  <!-- Node 3: Details -->
  <rect x="640" y="300" width="200" height="110" rx="16" fill="#ffffff" stroke="#a3754c" stroke-width="2"></rect>
  <text x="740" y="345" text-anchor="middle" font-size="16" font-weight="600" fill="#16202a">جزئیات ملک</text>
  <text x="740" y="368" text-anchor="middle" font-size="12" fill="#667089">Property Details</text>
  <text x="740" y="388" text-anchor="middle" font-size="11" fill="#a3754c">ملک‌های مشابه</text>

  <!-- Node 4a: Contact (top branch) -->
  <rect x="930" y="110" width="210" height="110" rx="16" fill="#ffffff" stroke="#a3754c" stroke-width="2"></rect>
  <text x="1035" y="150" text-anchor="middle" font-size="16" font-weight="600" fill="#16202a">تماس با مشاور</text>
  <text x="1035" y="172" text-anchor="middle" font-size="12" fill="#667089">فرم Contact</text>
  <text x="1035" y="192" text-anchor="middle" font-size="11" fill="#a3754c">Inline Validation + Success State</text>

  <!-- Node 4b: Home loans (bottom branch) -->
  <rect x="930" y="490" width="210" height="110" rx="16" fill="#ffffff" stroke="#a3754c" stroke-width="2"></rect>
  <text x="1035" y="530" text-anchor="middle" font-size="16" font-weight="600" fill="#16202a">محاسبه وام مسکن</text>
  <text x="1035" y="552" text-anchor="middle" font-size="12" fill="#667089">Mortgage Calculator</text>
  <text x="1035" y="572" text-anchor="middle" font-size="11" fill="#a3754c">Real-time Feedback</text>

  <!-- Node 5: Sign up/in -->
  <rect x="1230" y="300" width="200" height="110" rx="16" fill="#ffffff" stroke="#a3754c" stroke-width="2"></rect>
  <text x="1330" y="340" text-anchor="middle" font-size="16" font-weight="600" fill="#16202a">ثبت‌نام / ورود</text>
  <text x="1330" y="362" text-anchor="middle" font-size="12" fill="#667089">Sign Up / Sign In</text>
  <text x="1330" y="382" text-anchor="middle" font-size="11" fill="#a3754c">Error Prevention</text>

  <!-- Node 6: End -->
  <rect x="1500" y="300" width="200" height="110" rx="16" fill="#10202b"></rect>
  <text x="1600" y="340" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">پیگیری توسط مشاور</text>
  <text x="1600" y="362" text-anchor="middle" font-size="12" fill="#d9dde0">و تکمیل فرآیند خرید</text>
  <text x="1600" y="382" text-anchor="middle" font-size="11" fill="#a3754c">Goal Completion</text>

  <!-- Arrows -->
  <path d="M240,355 L330,355" stroke="#8c6239" stroke-width="2.5" fill="none" marker-end="url(#arrow)"></path>
  <path d="M550,355 L640,355" stroke="#8c6239" stroke-width="2.5" fill="none" marker-end="url(#arrow)"></path>

  <path d="M840,330 C880,300 890,220 930,175" stroke="#8c6239" stroke-width="2.5" fill="none" marker-end="url(#arrow)"></path>
  <path d="M840,380 C880,420 890,500 930,545" stroke="#8c6239" stroke-width="2.5" fill="none" marker-end="url(#arrow)"></path>

  <path d="M1140,175 C1190,220 1220,260 1250,300" stroke="#8c6239" stroke-width="2.5" fill="none" marker-end="url(#arrow)"></path>
  <path d="M1140,545 C1190,500 1220,440 1250,410" stroke="#8c6239" stroke-width="2.5" fill="none" marker-end="url(#arrow)"></path>

  <path d="M1430,355 L1500,355" stroke="#8c6239" stroke-width="2.5" fill="none" marker-end="url(#arrow)"></path>

  <!-- Guest shortcut -->
  <path d="M740,410 C740,650 1330,650 1330,410" stroke="#a3754c" stroke-width="1.5" stroke-dasharray="6 6" fill="none" marker-end="url(#arrow)"></path>
  <text x="1035" y="690" text-anchor="middle" font-size="12" fill="#8c6239">مسیر میهمان (بدون ثبت‌نام) — تماس مستقیم با مشاور</text>
</svg>
